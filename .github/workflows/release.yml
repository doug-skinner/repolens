name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: repolens-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: repolens-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: repolens-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: repolens-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build.ts --target=${{ matrix.target }} --output=${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            repolens-darwin-arm64
            repolens-darwin-x64
            repolens-linux-x64
            repolens-linux-arm64

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: doug-skinner/homebrew-repolens
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="doug-skinner/repolens"

          declare -A SHAS
          for PLATFORM in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/repolens-${PLATFORM}"
            SHAS[$PLATFORM]=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          done

          cat > Formula/repolens.rb <<FORMULA
          class Repolens < Formula
            desc "TUI dashboard for your GitHub repositories"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/v#{version}/repolens-darwin-arm64"
                sha256 "${SHAS[darwin-arm64]}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/v#{version}/repolens-darwin-x64"
                sha256 "${SHAS[darwin-x64]}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/v#{version}/repolens-linux-arm64"
                sha256 "${SHAS[linux-arm64]}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/v#{version}/repolens-linux-x64"
                sha256 "${SHAS[linux-x64]}"
              end
            end

            def install
              bin.install Dir["repolens-*"].first => "repolens"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/repolens.rb
          git commit -m "repolens ${VERSION}"
          git push
